# Adaptateur dynamique Trax -> ILIAS CmiXapi aggregate.
# À placer sur le serveur Trax, par exemple :
# /etc/httpd/conf.d/trax-ilias-aggregate-adapter.conf

# Cas recommandé : URL avec client ET store.
AliasMatch "^/trax/api/gateway/clients/([^/]+)/stores/([^/]+)/api/statements/aggregate$" "/var/www/trax-ilias-aggregate-adapter/aggregate.php"

# Cas ILIAS 10 natif : le core ILIAS construit une URL sans nom de store.
# L'adaptateur utilisera config.php: default_store ou client_store_map.
AliasMatch "^/trax/api/gateway/clients/([^/]+)/stores/api/statements/aggregate$" "/var/www/trax-ilias-aggregate-adapter/aggregate.php"

<Directory "/var/www/trax-ilias-aggregate-adapter">
    Require all granted
    Options -Indexes
</Directory>

# Si Authorization n'arrive pas à PHP avec FastCGI, décommente :
# SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

# Trax ILIAS Bridge - Apache configuration
#
# À placer avant les règles générales de Trax/Laravel.
# Requiert mod_rewrite.
#
# Noms conservés par rapport à la première version :
# - apache-trax-ilias-adapter.conf
# - aggregate.php
# - /var/www/trax-ilias-aggregate-adapter

Alias "/trax-ilias-aggregate-adapter" "/var/www/trax-ilias-aggregate-adapter"

<Directory "/var/www/trax-ilias-aggregate-adapter">
    Require all granted
    Options -Indexes
    AllowOverride None
</Directory>

# Permet à PHP de récupérer l'en-tête Authorization si nécessaire.
SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

RewriteEngine On

# 1) Pré-lancement cmi5 :
# ILIAS 10 envoie activity_id ; l'adaptateur le supprime puis transmet à Trax.
RewriteCond %{HTTP:X-Trax-Ilias-Bridge-Bypass} !^1$
RewriteRule ^/trax/api/gateway/clients/[^/]+/stores/[^/]+/cmi5/tokens$ /trax-ilias-aggregate-adapter/aggregate.php [END,QSA]

# 2) Learning Experiences / Ranking avec URL contenant le store :
# /clients/{client}/stores/{store}/api/statements/aggregate
RewriteCond %{HTTP:X-Trax-Ilias-Bridge-Bypass} !^1$
RewriteRule ^/trax/api/gateway/clients/[^/]+/stores/[^/]+/api/statements/aggregate$ /trax-ilias-aggregate-adapter/aggregate.php [END,QSA]

# 3) Learning Experiences / Ranking avec URL native ILIAS 10 qui perd le store :
# /clients/{client}/stores/api/statements/aggregate
RewriteCond %{HTTP:X-Trax-Ilias-Bridge-Bypass} !^1$
RewriteRule ^/trax/api/gateway/clients/[^/]+/stores/api/statements/aggregate$ /trax-ilias-aggregate-adapter/aggregate.php [END,QSA]
